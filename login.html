<!doctype html><html lang='pt-BR'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Login — SIPI</title><link rel='stylesheet' href='style.css'></head>
<body class='min-h-screen w-full flex items-center justify-center bg-background px-4 py-10 relative overflow-hidden'>
<div class='pointer-events-none absolute inset-0 opacity-60'><div class='absolute -top-32 -left-32 h-96 w-96 rounded-full bg-primary/10 blur-3xl'></div><div class='absolute -bottom-32 -right-32 h-96 w-96 rounded-full bg-info/10 blur-3xl'></div></div>
<div class='relative w-full max-w-md'>
<div class='mb-4 flex items-center justify-center gap-2 text-[10px] tracking-[0.25em] font-bold text-destructive'><span class='h-px w-8 bg-destructive/50'></span>ACESSO RESTRITO<span class='h-px w-8 bg-destructive/50'></span></div>
<div class='bg-card border border-border rounded-2xl shadow-2xl shadow-black/40 overflow-hidden'>
<div class='px-8 pt-8 pb-6 text-center border-b border-border bg-gradient-to-b from-primary/5 to-transparent'><div class='mx-auto h-14 w-14 rounded-xl bg-primary/15 border border-primary/30 flex items-center justify-center mb-3 text-primary font-bold'>🛡</div><h1 class='text-2xl font-bold tracking-wide text-foreground'>SIPI</h1><p class='text-xs text-muted-foreground mt-1'>Sistema de Inquéritos Policiais</p><p class='text-[10px] text-muted-foreground/80 mt-1 tracking-wider uppercase'>DT Itabela · 23ª COORPIN</p></div>
<form class='px-8 py-7 space-y-5'>
<div class='space-y-2'><label for='usuario' class='text-xs tracking-wider uppercase text-muted-foreground font-semibold'>Usuário</label><input id='usuario' placeholder='Digite seu usuário' class='w-full pl-3 h-11 bg-background/60 border border-border rounded-lg' required></div>
<div class='space-y-2'><label for='senha' class='text-xs tracking-wider uppercase text-muted-foreground font-semibold'>Senha</label><input id='senha' type='password' placeholder='Digite sua senha' class='w-full pl-3 h-11 bg-background/60 border border-border rounded-lg' required></div>
<button type='submit' class='w-full h-11 bg-primary text-primary-foreground hover:bg-primary/90 font-bold tracking-[0.15em] uppercase text-xs rounded-lg'>ENTRAR</button>
<p class='text-center text-[10px] text-muted-foreground leading-relaxed'>Uso exclusivo de servidores autorizados.<br>Acessos são monitorados e registrados em auditoria.</p>
</form>
<div class='px-8 py-3 border-t border-border bg-muted/20 text-center text-[10px] text-muted-foreground tracking-wider'>v2.0.0 · SIPI © 2026</div>
</div></div></body></html>
